<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Tracker</title>

    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <h1>Media Tracker</h1>
    </header>

    <main>
        <section class="form-section">
            <h2>Adicionar Mídia</h2>
            <form action="" id="media-form">
                <input type="text" id="media-name" placeholder="Nome da mídia" required>

                <select name="media-type" id="media-type">
                    <option value="Filme">Filme</option>
                    <option value="Série">Série</option>
                    <option value="Anime">Anime</option>
                    <option value="Mangá">Mangá</option>
                    <option value="Livro">Livro</option>
                </select>

                <label for="status">Status</label>
                <select id="status">
                    <option value="planned">Planejado</option>
                    <option value="watching">Assistindo</option>
                    <option value="completed">Finalizado</option>
                </select>

                <div id="series-fields" class="dynamic-fields">
                    <label for="season">Temporada</label>
                    <input type="number" id="season" placeholder="Ex: 2">

                    <label for="episode">Episódio</label>
                    <input type="number" id="episode" placeholder="Ex: 5">
                </div>

                <div id="chapter-fields" class="dynamic-fields">
                    <label for="chapter">Capítulo</label>
                    <input type="number" id="chapter" placeholder="Ex: 12">
                </div>

                <div id="book-fields" class="dynamic-fields">
                    <label for="page">Página</label>
                    <input type="number" id="page" placeholder="Ex: 120">
                </div>

                <button type="submit">Adicionar</button>
            </form>
        </section>

        <section class="list-section">
            <h2>Minha Lista</h2>
            <label for="filter">Filtrar por status:</label>
            <select id="filter">
                <option value="all">Todos</option>
                <option value="planned">Planejado</option>
                <option value="watching">Assistindo</option>
                <option value="completed">Finalizado</option>
            </select>
            <ul id="media-list">

            </ul>
        </section>

    </main>
    
    <script src="assets/js/script.js"></script>
</body>
</html>
