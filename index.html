<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Tracker</title>

    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <h1>Media Tracker</h1>
    </header>

    <main>
        <section class="form-section">
            <h2>Adicionar Mídia</h2>
            <form action="" id="media-form">
                <input type="text" id="media-name" placeholder="Nome da mídia" required>

                <select name="media-type" id="media-type">
                    <option value="Filme">Filme</option>
                    <option value="Série">Série</option>
                    <option value="Anime">Anime</option>
                    <option value="Mangá">Mangá</option>
                    <option value="Livro">Livro</option>
                </select>

                <label for="progress">Onde parei</label>
                <input 
                    type="text"
                    id="progress"
                    placeholder="Ex: T2 EP5, Cap 7, Página 32"
                >

                <button type="submit">Adicionar</button>
            </form>
        </section>

        <section class="list-section">
            <h2>Minha Lista</h2>
            <ul id="media-list">

            </ul>
        </section>

    </main>
    
    <script src="assets/js/script.js"></script>
</body>
</html>
